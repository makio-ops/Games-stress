<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Flappy Tap Game</title>
  <style>
    body {
      margin: 0;
      background: #70c5ce;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial;
    }

    canvas {
      background: #70c5ce;
      border: 2px solid #000;
    }

    #info {
      position: absolute;
      top: 20px;
      color: white;
      font-size: 20px;
    }
  </style>
</head>
<body>

<div id="info">Klik / Tap untuk terbang 🐤</div>
<canvas id="game" width="320" height="480"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {
  x: 50,
  y: 150,
  gravity: 0.6,
  velocity: 0,
  lift: -10
};

let pipes = [];
let score = 0;
let gameOver = false;

// tap / klik
document.addEventListener("click", () => {
  if (!gameOver) {
    bird.velocity = bird.lift;
  } else {
    location.reload();
  }
});

// buat pipa
function createPipe() {
  let gap = 120;
  let top = Math.random() * (canvas.height - gap - 50) + 20;

  pipes.push({
    x: canvas.width,
    top: top,
    bottom: top + gap
  });
}

setInterval(createPipe, 1500);

function update() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  // jatuh
  if (bird.y > canvas.height || bird.y < 0) {
    gameOver = true;
  }

  // pipa gerak
  for (let i = 0; i < pipes.length; i++) {
    pipes[i].x -= 2;

    // tabrakan
    if (
      bird.x < pipes[i].x + 40 &&
      bird.x + 20 > pipes[i].x &&
      (bird.y < pipes[i].top || bird.y + 20 > pipes[i].bottom)
    ) {
      gameOver = true;
    }

    // skor
    if (pipes[i].x === 50) {
      score++;
    }
  }

  // hapus pipa lama
  pipes = pipes.filter(p => p.x > -50);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // bird
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, 20, 20);

  // pipes
  ctx.fillStyle = "green";
  for (let p of pipes) {
    ctx.fillRect(p.x, 0, 40, p.top);
    ctx.fillRect(p.x, p.bottom, 40, canvas.height);
  }

  // score
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 25);

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 70, 240);
    ctx.font = "16px Arial";
    ctx.fillText("Klik untuk restart", 85, 270);
  }
}

function loop() {
  if (!gameOver) update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
