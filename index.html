<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Flappy Fix Game</title>
  <style>
    body {
      margin: 0;
      background: #4ec0ca;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial;
    }

    canvas {
      background: #70c5ce;
      border: 3px solid #000;
    }
  </style>
</head>
<body>

<canvas id="game" width="320" height="480"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🐤 BURUNG (dibuat lebih jelas)
let bird = {
  x: 60,
  y: 200,
  w: 25,
  h: 25,
  velocity: 0,
  gravity: 0.4,
  jump: -7
};

let pipes = [];
let score = 0;
let gameOver = false;

// 🕹️ kontrol (klik / tap / spasi)
function flap() {
  if (!gameOver) {
    bird.velocity = bird.jump;
  } else {
    location.reload();
  }
}

document.addEventListener("click", flap);
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") flap();
});

// 🌿 bikin pipa
function makePipe() {
  let gap = 120;
  let top = Math.random() * 200 + 50;

  pipes.push({
    x: 320,
    top: top,
    bottom: top + gap,
    w: 40
  });
}

setInterval(() => {
  if (!gameOver) makePipe();
}, 1500);

// 🔁 update game
function update() {
  // burung jatuh
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  // batas layar
  if (bird.y > 480 || bird.y < 0) {
    gameOver = true;
  }

  // pipa jalan
  for (let p of pipes) {
    p.x -= 2;

    // tabrakan
    if (
      bird.x < p.x + p.w &&
      bird.x + bird.w > p.x &&
      (bird.y < p.top || bird.y + bird.h > p.bottom)
    ) {
      gameOver = true;
    }

    // score
    if (!p.passed && p.x + p.w < bird.x) {
      score++;
      p.passed = true;
    }
  }

  // hapus pipa lama
  pipes = pipes.filter(p => p.x > -50);
}

// 🎨 gambar
function draw() {
  ctx.clearRect(0, 0, 320, 480);

  // burung 🐤
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

  // pipa 🌿
  ctx.fillStyle = "green";
  for (let p of pipes) {
    ctx.fillRect(p.x, 0, p.w, p.top);
    ctx.fillRect(p.x, p.bottom, p.w, 480);
  }

  // score
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 25);

  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 60, 240);
    ctx.font = "16px Arial";
    ctx.fillText("Klik / Space untuk restart", 60, 270);
  }
}

// loop utama
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
