<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Mystery Number Game</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 80px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      width: 85%;
      cursor: pointer;
      background: #2563eb;
      border: none;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #msg {
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>🎮 Mystery Number</h2>
    <p>Tebak angka 1 - 10</p>

    <input type="number" id="guess" placeholder="Masukkan tebakan">
    <button onclick="check()">Tebak!</button>

    <p id="msg"></p>
  </div>

  <script>
    let angkaRahasia = Math.floor(Math.random() * 10) + 1;
    let percobaan = 0;

    function check() {
      let tebakan = document.getElementById("guess").value;
      let msg = document.getElementById("msg");

      percobaan++;

      if (tebakan == angkaRahasia) {
        msg.innerHTML = "🎉 Benar! Kamu menang!";

        // 🔥 KEJUTAN (EASTER EGG)
        setTimeout(() => {
          alert("👀 KEJUTAN: Kamu menemukan mode rahasia!\nAI berkata: Kamu punya insting yang bagus 😏");
          document.body.style.background = "#4c1d95";
          msg.innerHTML = "✨ MODE RAHASIA AKTIF ✨";
        }, 500);

      } else if (tebakan > angkaRahasia) {
        msg.innerHTML = "📉 Terlalu besar!";
      } else {
        msg.innerHTML = "📈 Terlalu kecil!";
      }

      if (percobaan >= 5) {
        msg.innerHTML = "💀 Kesempatan habis! Angka: " + angkaRahasia;
      }
    }
  </script><script>
  let angkaRahasia = Math.floor(Math.random() * 10) + 1;
  let percobaan = 0;

  function check() {
    let tebakan = Number(document.getElementById("guess").value);
    let msg = document.getElementById("msg");
    percobaan++;

    if (!tebakan) {
      msg.innerHTML = "⚠️ Masukin angka dulu!";
      return;
    }

    if (tebakan === angkaRahasia) {
      msg.innerHTML = "🎉 BENAR! Kamu menang!";

      // ✨ EASTER EGG JELAS
      setTimeout(() => {
        document.body.innerHTML = `
          <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            flex-direction:column;
            font-family:Arial;
            background:#000;
            color:#00ff88;
          ">
            <h1>🎊 MODE RAhasia TERBUKA 🎊</h1>
            <p>Kamu menemukan angka tersembunyi: <b>${angkaRahasia}</b></p>
            <p>🧠 AI Message: "Instingmu lebih tajam dari kebanyakan pemain."</p>
            <button onclick="location.reload()" style="
              margin-top:20px;
              padding:10px 20px;
              cursor:pointer;
            ">
              Main Lagi
            </button>
          </div>
        `;
      }, 600);

    } 
    else if (tebakan > angkaRahasia) {
      msg.innerHTML = "📉 Kelebihan!";
    } 
    else {
      msg.innerHTML = "📈 Kurang!";
    }

    if (percobaan >= 5 && tebakan !== angkaRahasia) {
      msg.innerHTML = "💀 Game Over! Angka: " + angkaRahasia;
    }
  }
  </script>

</body>
</html>
